spring.application.name=main

# Server Configuration
server.port=2345

# ============================================================
# Database Configuration
# LOCAL (Docker Compose):  docker compose -f docker/docker-compose.single.yml up postgres -d
#                          then run: ./mvnw spring-boot:run
#                          App connects to localhost:5432
#
# REMOTE DOCKER HOST:      Set environment variable:
#                          export SPRING_DATASOURCE_URL=jdbc:postgresql://<docker-host-ip>:5432/...
#
# DOCKER INSIDE NETWORK:   Uses profile=single, connects via 'postgres' hostname
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/computershop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Server Configuration
server.servlet.context-path=/

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.max-age=-1
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=cookie

# DevTools - hot reload (tự restart khi build lại)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms

